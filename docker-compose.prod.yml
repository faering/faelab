# docker-compose.prod.yml - production overrides.
# Layered on top of docker-compose.yml:
#
#   IMAGE_TAG=1.2.3 docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.prod.yml \
#     --profile app \
#     --project-name faelab-prod \
#     up -d

services:

  nginx:
    container_name: faelab_nginx
    restart: unless-stopped
    ports:
      - "80:80"     # Cloudflare -> Hetzner firewall -> UFW -> here
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro

  frontend:
    container_name: faelab_frontend
    restart: unless-stopped

  api:
    container_name: faelab_api
    restart: unless-stopped

  postgres:
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"   # SSH tunnel: ssh -L 5432:localhost:5432

  pgadmin:
    restart: unless-stopped
    ports:
      - "127.0.0.1:5050:80"     # SSH tunnel: ssh -L 5050:localhost:5050