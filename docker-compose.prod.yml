# docker-compose.prod.yml – staging and production deployment.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  # ── Reverse proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: faelab_nginx
    restart: unless-stopped
    ports:
      - "80:80"    # Cloudflare → Hetzner firewall → UFW → here (TLS terminates at CF)
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
    depends_on:
      - frontend
      - api
    networks:
      - web

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/faering/faelab/frontend:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: faelab_frontend
    restart: unless-stopped
    networks:
      - web

  # ── API (Fastify + tRPC) ───────────────────────────────────────────────────
  api:
    image: ghcr.io/faering/faelab/api:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: faelab_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      AUTH_SESSION_SECRET_FILE: /run/secrets/auth_session_secret
      AUTH_METHOD: ${AUTH_METHOD:-github}
      AUTH_ALLOWED_GITHUB_LOGIN: ${AUTH_ALLOWED_GITHUB_LOGIN:-}
      AUTH_ALLOWED_GITHUB_ID:    ${AUTH_ALLOWED_GITHUB_ID:-}
      AUTH_SESSION_TTL_DAYS:     ${AUTH_SESSION_TTL_DAYS:-7}
      AUTH_SUCCESS_REDIRECT:     ${AUTH_SUCCESS_REDIRECT:?AUTH_SUCCESS_REDIRECT is required}
      AUTH_FAILURE_REDIRECT:     ${AUTH_FAILURE_REDIRECT:?AUTH_FAILURE_REDIRECT is required}
      GITHUB_CLIENT_ID:          ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET_FILE: /run/secrets/github_client_secret
      GITHUB_CALLBACK_URL:       ${GITHUB_CALLBACK_URL:-}
      AUTH_ADMIN_USERNAME:       ${AUTH_ADMIN_USERNAME:-}
      AUTH_ADMIN_PASSWORD_FILE:  /run/secrets/auth_admin_password
      UPLOAD_BASE_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - postgres
    secrets:
      - auth_session_secret
      - auth_admin_password
      - github_client_secret
    networks:
      - web
      - internal

  # ── postgres: restart + loopback port (SSH-tunnel or local psql) ───────────
  postgres:
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"

  # ── pgAdmin: restart + loopback port (SSH-tunnel: ssh -L 5050:localhost:5050) 
  pgadmin:
    restart: unless-stopped
    ports:
      - "127.0.0.1:5050:80"

secrets:
  auth_session_secret:
    file: ./secrets/auth_session_secret.txt
  auth_admin_password:
    file: ./secrets/auth_admin_password.txt
  github_client_secret:
    file: ./secrets/github_client_secret.txt