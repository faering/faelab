name: Build & Push

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
            image: ghcr.io/faering/faelab/api
          - service: frontend
            dockerfile: apps/frontend/Dockerfile
            image: ghcr.io/faering/faelab/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Derives image tags from the git context:
      #   v1.2.3 tag  →  1.2.3, 1.2, 1, latest, sha-<short>
      #   main branch →  main, sha-<short>
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # VITE_API_BASE_URL is baked into the frontend image at build time.
      # Requires two repository variables to be set in GitHub:
      #   STAGING_API_BASE_URL  (e.g. https://staging.domain.com)
      #   PROD_API_BASE_URL     (e.g. https://domain.com)
      - name: Resolve build args
        id: build-args
        run: |
          if [[ "${{ matrix.service }}" == "frontend" ]]; then
            if [[ "${{ github.ref_type }}" == "tag" ]]; then
              VITE_URL="${{ vars.PROD_API_BASE_URL || '' }}"
            else
              VITE_URL="${{ vars.STAGING_API_BASE_URL || '' }}"
            fi
            echo "args=VITE_API_BASE_URL=${VITE_URL}" >> $GITHUB_OUTPUT
          else
            echo "args=" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ steps.build-args.outputs.args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
