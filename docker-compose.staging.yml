# docker-compose.staging.yml – staging-specific overrides.
# Layered on top of docker-compose.yml and docker-compose.prod.yml:
#
#   docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.prod.yml \
#     -f docker-compose.staging.yml \
#     --project-name faelab-staging \
#     up -d
#
# Differences from prod:
#   - nginx binds to host ports 8080/8443 (prod owns 80/443)
#   - nginx uses the staging vhost config (staging.faelab.com)
#   - Distinct container names to avoid collisions with the prod stack
#   - Postgres and pgAdmin bound to different loopback ports

services:

  nginx:
    container_name: faelab_staging_nginx
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./docker/nginx/nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro

  frontend:
    container_name: faelab_staging_frontend

  api:
    container_name: faelab_staging_api

  postgres:
    container_name: faelab_staging_postgres
    ports:
      - "127.0.0.1:5433:5432"   # different loopback port — prod uses 5432

  pgadmin:
    container_name: faelab_staging_pgadmin
    ports:
      - "127.0.0.1:5051:80"     # different loopback port — prod uses 5050
