# ──────────────────────────────────────────────────────────────────────────────
# Nginx reverse proxy – staging environment.
# Behind Cloudflare (Full/Strict mode). Host ports: 8080 (HTTP) / 8443 (HTTPS).
# Cloudflare connects to origin on port 8443 for staging.faelab.com.
# ──────────────────────────────────────────────────────────────────────────────

# Restore real visitor IP from Cloudflare (applies to all server blocks)
real_ip_header     CF-Connecting-IP;
set_real_ip_from   0.0.0.0/0;

# ── HTTP: redirect everything to HTTPS ────────────────────────────────────────
server {
    listen 80;
    server_name staging.faelab.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS: main server ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name staging.faelab.com;

    # Cloudflare Origin Certificate – use a wildcard cert (*.faelab.com) to
    # cover both faelab.com and staging.faelab.com with one certificate, or
    # issue a separate origin cert for staging.faelab.com in the Cloudflare dashboard.
    ssl_certificate     /etc/ssl/cloudflare/faelab.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/faelab.com.key;

    # Allow large uploads (videos up to 100 MB + form overhead)
    client_max_body_size 110m;

    # ── API routes ──────────────────────────────────────────────────────────
    location /trpc {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Cookie            $http_cookie;
        # WebSocket support (for potential tRPC subscriptions)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    location /auth {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Cookie            $http_cookie;
    }

    location /api {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Cookie            $http_cookie;
    }

    location /uploads {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_valid  200 1d;
    }

    # ── Frontend (catch-all) ────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
