# ──────────────────────────────────────────────────────────────────────────────
# Nginx reverse proxy – sits behind Cloudflare so only HTTP (port 80) is needed.
# Cloudflare terminates TLS; we trust the CF-Connecting-IP header for real IPs.
# ──────────────────────────────────────────────────────────────────────────────

# Pass real visitor IP from Cloudflare
real_ip_header     CF-Connecting-IP;
set_real_ip_from   0.0.0.0/0;

server {
    listen 80;
    server_name faelab.com www.faelab.com;

    # Return all HTTP requests to HTTPS (Cloudflare handles TLS)
    return 301 https://$host$request_uri;

    # Allow large uploads (videos up to 100 MB + form overhead)
    client_max_body_size 110m;

    # ── API routes ──────────────────────────────────────────────────────────
    location /trpc {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Cookie            $http_cookie;
        # WebSocket support (for potential tRPC subscriptions)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    location /auth {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Cookie            $http_cookie;
    }

    location /api {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Cookie            $http_cookie;
    }

    location /uploads {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        # Cache uploaded media at the proxy layer
        proxy_cache_valid  200 1d;
    }

    # ── Frontend (catch-all) ────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl;
    server_name faelab.com www.faelab.com;

    ssl_certificate     /etc/ssl/cloudflare/faelab.net.pem;
    ssl_certificate_key /etc/ssl/cloudflare/faelab.net.key;

    # Pass real visitor IP from Cloudflare
    real_ip_header     CF-Connecting-IP;
    set_real_ip_from   0.0.0.0/0;

    location / {
        ???????
    }

    location /api {
        ???????
    }

    ....
}