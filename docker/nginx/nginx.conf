# ──────────────────────────────────────────────────────────────────────────────
# Nginx reverse proxy – behind Cloudflare (Full/Strict mode).
# Cloudflare terminates TLS from the browser; nginx terminates the
# Cloudflare → origin connection using a Cloudflare Origin Certificate.
# Real visitor IPs are restored from the CF-Connecting-IP header.
# ──────────────────────────────────────────────────────────────────────────────

# Restore real visitor IP from Cloudflare (applies to all server blocks)
real_ip_header     CF-Connecting-IP;
set_real_ip_from   0.0.0.0/0;

# Use Docker's internal DNS so upstream hostnames are resolved at request time,
# not at nginx startup (prevents "host not found in upstream" on container start).
resolver 127.0.0.11 valid=10s ipv6=off;

# ── HTTP: redirect everything to HTTPS ────────────────────────────────────────
server {
    listen 80;
    server_name faelab.com www.faelab.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS: main server ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name faelab.com www.faelab.com;

    # Cloudflare Origin Certificate (issued in the Cloudflare dashboard)
    ssl_certificate     /etc/ssl/cloudflare/faelab.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/faelab.com.key;

    # Allow large uploads (videos up to 100 MB + form overhead)
    client_max_body_size 110m;

    # Upstream addresses as variables – required when using the resolver directive
    # so nginx re-resolves DNS on each request rather than caching at startup.
    set $api      http://api:3001;
    set $frontend http://frontend:80;

    # ── API routes ──────────────────────────────────────────────────────────
    location /trpc {
        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Cookie            $http_cookie;
        # WebSocket support (for potential tRPC subscriptions)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    location /auth {
        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Cookie            $http_cookie;
    }

    location /api {
        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Cookie            $http_cookie;
    }

    location /uploads {
        proxy_pass         $api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        # Cache uploaded media at the proxy layer
        proxy_cache_valid  200 1d;
    }

    # ── Frontend (catch-all) ────────────────────────────────────────────────
    location / {
        proxy_pass         $frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}